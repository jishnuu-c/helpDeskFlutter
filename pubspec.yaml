name: help_desk_flutter
description: "Help Desk Flutter App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  file_picker: ^10.2.0
  cached_network_image: ^3.4.1
  intl: ^0.20.0
  shared_preferences: ^2.5.3
  provider: ^6.1.5
  jwt_decoder: ^2.0.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.0
  flutter_spinkit: ^5.2.1
  fluttertoast: ^9.1.0
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/
    - lib/assets/icons/